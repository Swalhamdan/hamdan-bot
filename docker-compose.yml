version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-home-automation-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Optional: Mount logs directory if you want persistent logs
      - ./logs:/app/logs
      # Mount Docker socket to allow executing docker commands on host
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - bot-network
    # Allow access to host services (e.g., qBittorrent running on host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Health check to monitor bot status
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bot-network:
    driver: bridge

